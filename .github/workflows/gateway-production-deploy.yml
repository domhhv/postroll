name: Gateway Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Neon and Fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Deploy Database Migrations to Production Branch on Neon
        run: pnpm --filter @postroll/database db:deploy
        env:
          DIRECT_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy Gateway Production App to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
